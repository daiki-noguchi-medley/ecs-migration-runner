name: SQL Lint & Format Check

on:
  pull_request:
    paths:
      - "migrations/sql/**"
      - ".github/workflows/lint.yml"
      - "spotless.gradle.kts"
  push:
    branches: [main]
    paths:
      - "migrations/sql/**"
      - ".github/workflows/lint.yml"
      - "spotless.gradle.kts"

jobs:
  spotless:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Run Spotless Check
        run: gradle spotlessCheck

      - name: Comment on PR if format issues found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **SQL Format Check Failed**\n\nRun `make spotless-fix` locally to auto-format SQL files.'
            })
