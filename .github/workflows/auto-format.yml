name: Auto Format SQL with Spotless

on:
  push:
    branches: [main]
    paths:
      - "migrations/sql/**"
      - "spotless.gradle.kts"
      - "build.gradle.kts"

jobs:
  auto-format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@b4ffde65f69c369afd9a36eb57a0d5c566dc4970
        with:
          fetch-depth: 0  # Full history to check for recent commits

      - name: Set up JDK 21
        uses: actions/setup-java@5896cecc08402ac2b6b52a8e3a73e1b1d6b8e216
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Run Spotless Apply
        run: gradle spotlessApply

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No formatting changes needed"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "⚠️ Formatting changes detected"
          fi

      - name: Commit and push if changes exist
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add migrations/sql/
          git commit -m "style: auto-format SQL with Spotless [skip ci]"
          git push

      - name: Comment on PR if changes made
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const commits = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'main',
              per_page: 1
            });
            const lastCommit = commits.data[0];
            if (lastCommit.commit.message.includes('[skip ci]')) {
              console.log('✅ Auto-format commit applied');
            }
