name: Auto Format SQL with Spotless

on:
  push:
    branches: [main]
    paths:
      - "migrations/sql/**"
      - "spotless.gradle.kts"
      - "build.gradle.kts"

jobs:
  auto-format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history to check for recent commits

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Run Spotless Apply
        run: gradle spotlessApply

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No formatting changes needed"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "⚠️ Formatting changes detected"
          fi

      - name: Commit and push if changes exist
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add migrations/sql/
          git commit -m "style: auto-format SQL with Spotless [skip ci]"
          git push
